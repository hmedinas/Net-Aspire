services:
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: database
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Vaxi$$2025USPass
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'Vaxi$$2025USPass' -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - masternet-network

  database-seed:
    depends_on:
      database:
        condition: service_healthy
    build:
      context: ./Database
      dockerfile: Dockerfile
    container_name: database-seed
    environment:
      - SA_PASSWORD=Vaxi$$2025USPass
      - DB_SERVER=database
    networks:
      - masternet-network

networks:
  masternet-network:
    driver: bridge